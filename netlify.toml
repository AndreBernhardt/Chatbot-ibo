[build]
  publish = "dist"
  functions = "netlify/functions"

# @google/genai benötigt Node 20+
[build.environment]
  NODE_VERSION = "20"

[functions]
  directory = "netlify/functions"

# Ein einzelnes Function-File „gemini.js“ → nur /.netlify/functions/gemini
# (nicht /.netlify/functions/gemini/chat — das gäbe kein Handler / 502).
[[redirects]]
  from = "/api/gemini/*"
  to = "/.netlify/functions/gemini"
  status = 200

# HTML nicht aggressiv cachen (Vite-Build: /index.html)
[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"